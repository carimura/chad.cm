<!DOCTYPE html>
<html lang="en">
<head>
    {% include "head.html" %}
</head>
<body>
    <header>
        <div class="container">
            {% include "header.html" %}
        </div>
    </header>

    <main class="container" id="page">
        {{ content }}

        <h2>Latest X Posts</h2>
        <div class="xpost-feed">
        {% for post in x_posts %}
            <article class="xpost">
                <img class="xpost-avatar" src="/assets/chad.jpg" alt="" />
                <div class="xpost-body">
                    <div class="xpost-header">
                        <span class="xpost-name">Chad Arimura</span>
                        <span class="xpost-handle">@chadarimura</span>
                        <span class="xpost-sep">·</span>
                        <a class="xpost-date" href="{{ post.url }}" target="_blank" rel="noopener noreferrer">{{ post.date }}</a>
                    </div>
                    <p class="xpost-text">{{ post.text }}</p>
                    {% if post.image %}<img src="{{ post.image }}" class="xpost-image" alt="" loading="lazy" />{% endif %}
                </div>
            </article>
        {% endfor %}
        </div>
    </main>

    <footer>
        <div class="container">
            {% include "footer.html" %}
        </div>
    </footer>
</body>
</html>
